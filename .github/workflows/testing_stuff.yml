name: Testing stuff

on:
  push:
    branches:
      - main

env:
  JOINED_MESSAGE: ${{ join(github.event.commits.*.message) }}

jobs:
  a_test_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: commits
        env:
          COMMITS: ${{ toJson(github.event.commits) }}
        run: echo "$COMMITS"
      - name: commit messages
        env: 
          COMMIT_MESSAGES: ${{ toJson(github.event.commits.*.message) }}
        run: echo "$COMMIT_MESSAGES"
      - name: test join expression
        run: echo "$JOINED_MESSAGE"
      - name: test contain expression
        if: contains(env.JOINED_MESSAGE, '#skip')
        run: 'echo "The message has keyword #skip"'
  
          
  